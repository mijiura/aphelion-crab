<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW2.5 収支履歴メーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background-elements">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <header>
      <h1>SW2.5 収支履歴メーカー</h1>
      <p class="subtitle">ゆとしーと向けに、複数のアイテムの購入履歴をカンタン生成</p>
    </header>

    <div class="app-layout">

      <!-- Left Column: Input Form -->
      <section class="panel input-section glass-panel">
        <h2>アイテム追加</h2>

        <div class="tabs">
          <!-- [JS連携] data-target の値 ('preset-form' など) をJSが読み取り、クリックした時に対応するIDのフォームを表示させます -->
          <button class="tab-btn active" data-target="preset-form">プリセットから選ぶ</button>
          <button class="tab-btn" data-target="custom-form">手動入力</button>
        </div>

        <!-- Preset Item Form -->
        <!-- [JS連携] JS側で 'active-form' というクラスを付け外しすることで、表示/非表示を切り替えます -->
        <div id="preset-form" class="item-form active-form">
          <div class="form-group">
            <label for="preset-search">アイテム検索 (全カテゴリ)</label>
            <!-- [JS連携] JSがこの入力欄(inputイベント)を監視し、文字が打たれるたびにアイテムを絞り込みます -->
            <input type="text" id="preset-search" placeholder="例: ポーション" autocomplete="off">
          </div>

          <div id="category-tabs" class="category-tabs">
            <!-- JS will populate category tabs here -->
          </div>

          <div class="preset-grid-container">
            <div id="preset-grid" class="preset-grid">
              <!-- [JS連携] JSがJavaScript内のアイテムデータから動的に生成した <button> タグ群がここに挿入されます -->
            </div>
          </div>
        </div>

        <!-- Custom Item Form -->
        <form id="custom-form" class="item-form">
          <div class="form-group">
            <label for="custom-name">アイテム名</label>
            <input type="text" id="custom-name" placeholder="例: オリジナル魔剣" required>
          </div>
          <div class="form-group">
            <label for="custom-price">単価 (G)</label>
            <input type="number" id="custom-price" placeholder="1000" min="0" required>
          </div>
          <div class="form-row">
            <div class="form-group qty-group">
              <label for="custom-qty">個数</label>
              <!-- [JS連携] required属性があるため、空だと通常はブラウザが警告を出します。送信処理自体はJSの submit イベントで乗っ取られています -->
              <input type="number" id="custom-qty" value="1" min="1" required>
            </div>
            <button type="submit" class="primary-btn">リストに追加</button>
          </div>
        </form>
      </section>

      <!-- Right Column: List & Output -->
      <section class="panel output-section">

        <div class="glass-panel items-panel">
          <h2>
            追加済みアイテム
            <span id="total-cost-display" class="total-badge">合計: 0 G</span>
            <button id="clear-list-btn" class="icon-btn" title="全て削除">🗑️</button>
          </h2>
          <div class="items-list-container">
            <ul id="items-list" class="items-list">
              <!-- [JS連携] カートに追加されたアイテム情報をもとに、JSが <li> タグを作ってここに挿入します -->
              <li class="empty-state">まだアイテムがありません</li>
            </ul>
          </div>
        </div>

        <div class="glass-panel code-panel">
          <div class="panel-header">
            <h2>出力結果</h2>
            <button id="copy-btn" class="primary-btn sm-btn">
              <span>📋</span> コピー
            </button>
          </div>
          <textarea id="output-textarea" readonly placeholder="ここに出力テキストが生成されます。"></textarea>
          <div id="copy-toast" class="toast">コピーしました！</div>
        </div>

      </section>
    </div>
  </main>

  <!-- [JS連携] ここで外部のJavaScriptファイルを読み込みます。HTMLの末尾にあるため、画面の要素が全て揃ってからJSが実行されます -->
  <script src="script.js"></script>
</body>

</html>
